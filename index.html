<style>

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {

  color: var(--text);

}

/* Background texture */
body::before {

  z-index: 0;
}

/* ─── HEADER ─── */
header {

  align-items: center;

  backdrop-filter: blur(20px);
}

.logo {

  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.logo span {
  color: var(--text);
  font-weight: 400;
}

.live-badge {

  border: 1px solid rgba(232,64,64,0.3);

  padding: 5px 14px;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--red-live);
  font-weight: 600;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red-live);
  animation: pulse-red 1.5s ease-in-out infinite;
}

@keyframes pulse-red {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

/* ─── HERO ─── */
.hero {

  z-index: 1;
  text-align: center;
  padding: 70px 20px 50px;
}

.hero-tag {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.8;
}

.hero h1 {

  font-weight: 800;
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 16px;
}

.hero h1 em {
  font-style: normal;
  background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 15px;
  color: var(--text-muted);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.8;
  font-weight: 300;
}

/* ─── DIVIDER ─── */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 200px;
  margin: 40px auto 50px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.divider-diamond {
  width: 8px; height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ─── GRID ─── */
.grid-wrap {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 30px 80px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px 22px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s, transform 0.3s, background 0.3s;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.08), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover::before { opacity: 1; }

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-4px);
  background: var(--bg-hover);
}

.card:focus {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.card-img-wrap {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
}

.card img {
  width: 64px; height: 64px;
  object-fit: contain;
  transition: transform 0.3s;
}

.card:hover img { transform: scale(1.08); }

.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.card-status {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.card-live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #3dcc6b;
  margin-left: 5px;
  vertical-align: middle;
  animation: pulse-green 2s ease-in-out infinite;
}

@keyframes pulse-green {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}

#playerPage {

  z-index: 1;
  min-height: 100vh;
}

.player-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 40px;
  border-bottom: 1px solid var(--border);
}

.back-btn {

  align-items: center;
  gap: 10px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 18px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: 'Vazirmatn', sans-serif;
  font-size: 13px;
  transition: border-color 0.2s, color 0.2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.back-arrow { font-size: 18px; }

.ch-title-wrap { text-align: center; }

.ch-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}

.ch-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 2px;
  margin-top: 2px;
}

/* source selector */
.source-bar {
  display: flex;
  align-items: center;
  gap: 8px;
}

.src-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--text-muted);
  font-family: 'Vazirmatn', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.src-btn:hover { border-color: var(--border-hover); color: var(--gold); }
.src-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }

/* player area */
.player-wrap {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 30px;
}

.video-frame {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
  box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1);
}

video { width: 100%; display: block; }

/* loading overlay */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(7,10,15,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 20;
  backdrop-filter: blur(8px);
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.spinner {
  width: 44px; height: 44px;
  border: 2px solid rgba(201,168,76,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

/* error overlay */
.error-overlay {
  position: absolute;
  inset: 0;
  background: rgba(7,10,15,0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 20;
  text-align: center;
  padding: 30px;
}
.error-overlay.visible { display: flex; }

.error-icon { font-size: 40px; }
.error-title { font-size: 16px; font-weight: 600; color: var(--text); }
.error-msg { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.retry-btn {
  margin-top: 8px;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 10px 24px;
  color: var(--gold);
  cursor: pointer;
  font-family: 'Vazirmatn', sans-serif;
  font-size: 13px;
  transition: background 0.2s;
}
.retry-btn:hover { background: rgba(201,168,76,0.2); }

/* watermark */
.watermark {
  position: absolute;
  bottom: 14px;
  left: 18px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: rgba(201,168,76,0.5);
  letter-spacing: 2px;
  z-index: 5;
  pointer-events: none;

/* ─── FOOTER ─── */
footer {

  padding: 30px 20px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 1px;

/* ─── PLYR OVERRIDES ─── */
.plyr--video .plyr__control--overlaid {
  background: rgba(201,168,76,0.85) !important;
}
.plyr--full-ui input[type=range] {
  color: var(--gold) !important;
}
.plyr__control.plyr__tab-focus,
.plyr__control:hover,
.plyr__control[aria-expanded=true] {
  background: var(--gold) !important;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  header { padding: 0 20px; }
  .logo { font-size: 18px; }
  .hero { padding: 50px 20px 30px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .grid-wrap { padding: 0 16px 60px; }
  .player-header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
  .player-wrap { padding: 0 16px; margin: 24px auto; }
  .source-bar { flex-wrap: wrap; }
}

/* animations */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to { opacity:1; transform: translateY(0); }
}

.card { animation: fadeUp 0.5s ease both; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.15s; }

</style>

const isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !v);
}

function showError(msg) {
  const ov = document.getElementById('errorOverlay');
  document.getElementById('errorMsg').textContent = msg || 'پخش زنده در دسترس نیست';
  ov.classList.add('visible');
}

function hideError() {
  document.getElementById('errorOverlay').classList.remove('visible');
}

function destroyPlayer() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (plyrInstance) { plyrInstance.destroy(); plyrInstance = null; }
  const video = document.getElementById('video');
  video.src = '';
  video.load();
}

function openChannel(ch) {
  currentChannel = ch;
  currentLinkIndex = 0;
  document.getElementById('channelTitle').textContent = ch.name;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('playerPage').style.display = 'block';
  buildSourceBar(ch);
  loadLink(currentLinkIndex);
}

function buildSourceBar(ch) {
  const bar = document.getElementById('sourceBar');
  bar.innerHTML = '';
  ch.links.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'src-btn' + (i === 0 ? ' active' : '');
    btn.textContent = 'لینک ' + (i + 1);
    btn.addEventListener('click', () => {
      if (currentLinkIndex === i) return;
      currentLinkIndex = i;
      updateSourceBar();
      loadLink(i);
    });
    bar.appendChild(btn);
  });
}

function updateSourceBar() {
  document.querySelectorAll('.src-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentLinkIndex);
  });
}

function loadLink(index) {
  destroyPlayer();
  hideError();
  showLoading(true);

  const url = currentChannel.links[index];
  const video = document.getElementById('video');

  if (isiOS) {
    video.src = url;
    video.play().catch(() => tryNextLink());
    showLoading(false);
    return;
  }

  if (Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: true });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      showLoading(false);
      plyrInstance = new Plyr(video, {
        controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'],
        settings: ['speed','quality'],
      });
      video.play().catch(() => {});
    });

    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) tryNextLink();
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => showLoading(false), { once: true });
    video.play().catch(() => tryNextLink());
  } else {
    showLoading(false);
    showError('مرورگر شما از پخش زنده پشتیبانی نمی‌کند.');
  }
}

function tryNextLink() {
  if (!currentChannel) return;
  const next = currentLinkIndex + 1;
  if (next < currentChannel.links.length) {
    currentLinkIndex = next;
    updateSourceBar();
    document.getElementById('errorMsg').textContent = 'در حال امتحان لینک ' + (next + 1) + '...';
    document.getElementById('errorOverlay').classList.add('visible');
    setTimeout(() => {
      hideError();
      loadLink(next);
    }, 1200);
  } else {
    showLoading(false);
    showError('هیچ لینک فعالی یافت نشد. لطفاً بعداً دوباره امتحان کنید.');
  }
}

function retryAll() {
  currentLinkIndex = 0;
  updateSourceBar();
  hideError();
  loadLink(0);
}

function goBack() {
  destroyPlayer();
  hideError();
  showLoading(false);
  document.getElementById('playerPage').style.display = 'none';
  document.getElementById('homePage').style.display = 'block';
  currentChannel = null;
}
</script>
</body>
</html>
