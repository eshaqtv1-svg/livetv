<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaq TV Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Plyr -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:radial-gradient(circle at top,#111827,#0f172a,#020617);color:#fff;}
header{text-align:center;padding:35px;font-size:38px;font-weight:900;background:linear-gradient(90deg,#00f5ff,#00ff9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;padding:40px;max-width:1400px;margin:auto;}
.card{background:rgba(255,255,255,0.05);border-radius:30px;padding:25px;text-align:center;backdrop-filter:blur(25px);transition:0.4s;cursor:pointer;}
.card:hover{transform:scale(1.05);box-shadow:0 0 35px rgba(0,255,255,0.6);}
.card img{width:100%;height:120px;object-fit:contain;margin-bottom:15px;}
.card span{font-size:20px;font-weight:700;}
#playerPage{display:none;text-align:center;padding:30px;}
.videoWrapper{position:relative;max-width:1200px;margin:auto;}
video{width:100%;border-radius:20px;}
#overlayLogo{position:absolute;bottom:15px;left:15px;background:rgba(0,0,0,0.5);padding:8px 15px;border-radius:20px;z-index:10;}
#linkLabel{position:absolute;top:15px;right:15px;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:15px;font-size:14px;z-index:10;}
#sourceMenu{position:fixed;bottom:90px;right:30px;z-index:30;}
#sourceBtn{background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);padding:12px 18px;border-radius:25px;cursor:pointer;border:1px solid rgba(255,255,255,0.2);font-size:14px;}
#sourceOptions{display:none;margin-top:10px;background:rgba(0,0,0,0.6);backdrop-filter:blur(20px);border-radius:15px;overflow:hidden;min-width:140px;}
#sourceOptions div{padding:10px 15px;cursor:pointer;transition:0.3s;}
#sourceOptions div:hover{background:rgba(0,255,255,0.3);}
button{margin-top:25px;padding:14px 30px;border:none;border-radius:40px;cursor:pointer;background:#00ffcc;}
</style>
</head>

<body>
<header>🔥 Ishaq TV 🔥</header>

<div id="homePage">
<div class="grid">
<div class="card" onclick="openChannel('tolo','طلوع')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993521-914660414.svg"><span>طلوع</span></div>
<div class="card" onclick="openChannel('irib3','شبکه سه')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993719-124056621.svg"><span>شبکه سه</span></div>
<div class="card" onclick="openChannel('varzesh','ورزش')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993702-549827287.svg"><span>ورزش</span></div>
<div class="card" onclick="openChannel('persiana','پرشیا اسپورت')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993686-807307490.svg"><span>پرشیا اسپورت</span></div>
<div class="card" onclick="openChannel('persiana2','پرشیا اسپورت 2')"><img src="https://cdn1.movieland.af/images/channels-logos/1763529079539-200808624.svg"><span>پرشیا اسپورت 2</span></div>
<div class="card" onclick="openChannel('solh','صلح اسپورت')"><img src="https://cdn1.movieland.af/images/channels-logos/1769243953209-579707064.svg"><span>صلح اسپورت</span></div>
<div class="card" onclick="openChannel('sportsaf','Sports AF')"><img src="https://cdn1.movieland.af/images/channels-logos/1768027145119-177342014.svg"><span>Sports AF</span></div>
<div class="card" onclick="openChannel('arezo','آرزو')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993620-281627637.svg"><span>آرزو</span></div>
<div class="card" onclick="openChannel('ariana','آریانا')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993561-302702845.svg"><span>آریانا</span></div>
<div class="card" onclick="openChannel('tv1','شبکه یک')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993637-382992096.svg"><span>شبکه یک</span></div>
<div class="card" onclick="openChannel('meraj','معراج')"><img src="https://cdn1.movieland.af/images/channels-logos/1769234333004-354961839.svg"><span>معراج</span></div>
<div class="card" onclick="openChannel('gem','GEM')"><img src="https://kbl-cdn.movie.af/channels/32/media/logo/w300/caf0cede-0c1e-4429-9a26-6775c6d95f17.png"><span>GEM</span></div>
</div>
</div>

<div id="playerPage">
<h2 id="channelTitle"></h2>
<div class="videoWrapper">
<video id="video" playsinline controls></video>
<div id="overlayLogo">Ishaq TV</div>
<div id="linkLabel">Auto</div>
</div>

<div id="sourceMenu">
<div id="sourceBtn">📡 انتخاب لینک</div>
<div id="sourceOptions"></div>
</div>

<br>
<button onclick="goBack()">بازگشت</button>
</div>

<script>
let hls, player;
let currentChannel = "";
let currentLinks = [];
let currentIndex = 0;
let currentQuality = "auto";
const isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

const channels = {
  tolo:["https://ishaq-proxy.eshaqtv1.workers.dev/tolo/playlist.m3u8","https://tgn.bozztv.com/eshgtv-dvrfl05/gin-tolohd/tracks-v1a1/mono.m3u8"],
  irib3:["https://ishaq-proxy.eshaqtv1.workers.dev/irib3/playlist.m3u8"],
  varzesh:["https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/playlist.m3u8"],
  persiana:["https://ishaq-proxy.eshaqtv1.workers.dev/persiana/playlist.m3u8"],
  persiana2:["https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/playlist.m3u8"],
  solh:["https://ishaq-proxy.eshaqtv1.workers.dev/solh/playlist.m3u8"],
  sportsaf:["https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/playlist.m3u8"],
  arezo:["https://ishaq-proxy.eshaqtv1.workers.dev/arezo/playlist.m3u8"],
  ariana:["https://ishaq-proxy.eshaqtv1.workers.dev/ariana/playlist.m3u8","https://tgn.bozztv.com/eshgtv-dvrfl05/gin-ariana/tracks-v1a1/mono.m3u8"],
  tv1:["https://tgn.bozztv.com/eshgtv-dvrfl05/gin-1tvafg/tracks-v1/mono.m3u8"],
  meraj:["https://ishaq-proxy.eshaqtv1.workers.dev/meraj/playlist.m3u8"],
  gem:["https://ishaq-proxy.eshaqtv1.workers.dev/gem/playlist.m3u8"]
};

function openChannel(channel,name){
  currentChannel = channel;
  document.getElementById("channelTitle").innerText = name;
  document.getElementById("homePage").style.display="none";
  document.getElementById("playerPage").style.display="block";
  currentLinks = channels[channel];
  currentIndex = 0;
  createSourceMenu();
  
  const video = document.getElementById("video");
  if(isiOS){
    video.src = currentLinks[currentIndex];
    video.play();
  } else {
    loadStream(currentLinks[currentIndex], currentQuality);
  }
}

function createSourceMenu(){
  const container=document.getElementById("sourceOptions");
  container.innerHTML="";
  currentLinks.forEach((link,index)=>{
    const item=document.createElement("div");
    item.innerText="لینک "+(index+1);
    item.addEventListener("click",()=>{
      if(currentIndex===index) return;
      currentIndex=index;
      container.style.display="none";
      const video=document.getElementById("video");
      if(hls){ hls.destroy(); hls=null; }
      if(player){ player.destroy(); player=null; }
      if(isiOS){
        video.src = currentLinks[currentIndex];
        video.play();
      } else {
        loadStream(currentLinks[currentIndex],currentQuality);
      }
    });
    container.appendChild(item);
  });
}

document.getElementById("sourceBtn").onclick = ()=>{
  let menu=document.getElementById("sourceOptions");
  menu.style.display=(menu.style.display==="block")?"none":"block";
};

function loadStream(baseUrl, quality){
  const video=document.getElementById("video");
  let url = baseUrl;
  if(quality==="1080") url=baseUrl.replace("playlist.m3u8","chunklist0.m3u8");
  else if(quality==="720") url=baseUrl.replace("playlist.m3u8","chunklist1.m3u8");
  document.getElementById("linkLabel").innerText = (quality==="auto")?"Auto":quality+"p";

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      player = new Plyr(video,{
        settings:['speed','quality','fullscreen'],
        quality:{default:quality,options:['auto','720','1080'],forced:true}
      });
      video.play();
    });
    hls.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        const nextIndex=currentIndex+1;
        if(nextIndex<currentLinks.length){
          currentIndex=nextIndex;
          loadStream(currentLinks[currentIndex],currentQuality);
        }
      }
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=url;
    video.play();
  }
}

function goBack(){
  if(hls){ hls.destroy(); hls=null; }
  if(player){ player.destroy(); player=null; }
  document.getElementById("playerPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}
</script>
</body>
</html>
