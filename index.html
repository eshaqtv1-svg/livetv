<script>
let hls;
let player;
let currentChannel="";
let currentQuality="auto";
let currentBaseUrl="";

// شبکه‌ها
const channels = {
  tolo: ["https://ishaq-proxy.eshaqtv1.workers.dev/tolo/playlist.m3u8","https://ishaq-proxy.eshaqtv1.workers.dev/tolo2/playlist.m3u8"],
  irib3: ["https://ishaq-proxy.eshaqtv1.workers.dev/irib3/playlist.m3u8"],
  varzesh: ["https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/playlist.m3u8"],
  persiana: ["https://ishaq-proxy.eshaqtv1.workers.dev/persiana/playlist.m3u8"],
  persiana2: ["https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/playlist.m3u8"],
  solh: ["https://ishaq-proxy.eshaqtv1.workers.dev/solh/playlist.m3u8"],
  sportsaf: ["https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/playlist.m3u8"],
  arezo: ["https://ishaq-proxy.eshaqtv1.workers.dev/arezo/playlist.m3u8"],
  ariana: ["https://ishaq-proxy.eshaqtv1.workers.dev/ariana/playlist.m3u8"],
  meraj: ["https://ishaq-proxy.eshaqtv1.workers.dev/meraj/playlist.m3u8"]
};

let currentLinks = [];

// باز کردن کانال و ساخت منو
async function openChannel(channel,name){
  currentChannel = channel;
  document.getElementById("channelTitle").innerText = name;
  document.getElementById("homePage").style.display="none";
  document.getElementById("playerPage").style.display="block";

  currentLinks = channels[channel];
  createSourceMenu();

  // پیش‌فرض پخش لینک اول
  currentBaseUrl = currentLinks[0];
  loadStream(currentBaseUrl,currentQuality);
}

// ساخت منوی لینک‌ها
function createSourceMenu(){
  const container = document.getElementById("sourceOptions");
  container.innerHTML = "";

  currentLinks.forEach((link,index)=>{
    const item = document.createElement("div");
    item.innerText = "لینک " + (index+1);
    item.onclick = ()=>{
      currentBaseUrl = link;  // لینک جاری
      loadStream(currentBaseUrl,currentQuality);
      document.getElementById("sourceOptions").style.display="none";
    };
    container.appendChild(item);
  });
}

document.getElementById("sourceBtn").onclick = ()=>{
  let menu = document.getElementById("sourceOptions");
  menu.style.display = menu.style.display==="block" ? "none" : "block";
};

// منوی کیفیت
document.getElementById("qualityBtn").onclick = ()=>{
  let menu = document.getElementById("qualityOptions");
  menu.style.display = menu.style.display==="block" ? "none" : "block";
};

function setQuality(q){
  currentQuality=q;
  loadStream(currentBaseUrl,q); // تغییر کیفیت همان لینک جاری
  document.getElementById("qualityOptions").style.display="none";
}

// بارگذاری استریم
function loadStream(baseUrl,quality){
  const video=document.getElementById("video");
  let url = baseUrl;

  if(quality==="1080") url = baseUrl.replace("playlist.m3u8","chunklist0.m3u8");
  else if(quality==="720") url = baseUrl.replace("playlist.m3u8","chunklist1.m3u8");

  document.getElementById("linkLabel").innerText = quality==="auto"?"Auto":quality+"p";

  if(hls) hls.destroy();
  if(player) player.destroy();

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){
      player = new Plyr(video,{settings:['speed','fullscreen']});
      video.play();
    });
    hls.on(Hls.Events.ERROR,function(e,d){
      if(d.fatal){
        const nextIndex = currentLinks.indexOf(baseUrl)+1;
        if(nextIndex<currentLinks.length) loadStream(currentLinks[nextIndex],quality);
      }
    });
  }else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=url;
    video.play();
  }
}

// دکمه بازگشت
function goBack(){
  if(hls) hls.destroy();
  if(player) player.destroy();
  document.getElementById("playerPage").style.display="none";
  document.getElementById("homePage").style.display="block";
}
</script>
