<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaq TV Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Plyr -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:radial-gradient(circle at top,#111827,#0f172a,#020617);color:#fff;}
header{text-align:center;padding:35px;font-size:38px;font-weight:900;background:linear-gradient(90deg,#00f5ff,#00ff9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;padding:40px;max-width:1400px;margin:auto;}
.card{background:rgba(255,255,255,0.05);border-radius:30px;padding:25px;text-align:center;backdrop-filter:blur(25px);transition:0.4s;cursor:pointer;}
.card:hover{transform:scale(1.05);box-shadow:0 0 35px rgba(0,255,255,0.6);}
.card img{width:100%;height:120px;object-fit:contain;margin-bottom:15px;}
.card span{font-size:20px;font-weight:700;}

#playerPage{display:none;text-align:center;padding:30px;}
.videoWrapper{position:relative;max-width:1200px;margin:auto;}
video{width:100%;border-radius:20px;}

#overlayLogo{
position:absolute;bottom:15px;left:15px;
background:rgba(0,0,0,0.5);
padding:8px 15px;border-radius:20px;
z-index:10;
}

#linkLabel{
position:absolute;
top:15px;
right:15px;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:15px;
font-size:14px;
z-index:10;
}

/* کیفیت شیشه‌ای */
#qualityMenu{
position:absolute;
bottom:20px;
right:20px;
z-index:20;
font-size:10px;
}

#qualityBtn{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:10px 15px;
border-radius:20px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.2);
}

#qualityOptions{
display:none;
margin-top:10px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
border-radius:15px;
overflow:hidden;
}

#qualityOptions div{
padding:10px 20px;
cursor:pointer;
transition:0.3s;
}

#qualityOptions div:hover{
background:rgba(0,255,255,0.3);
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
cursor:pointer;
background:#00ffcc;
}
</style>
</head>

<body>

<header>🔥 Ishaq TV 🔥</header>

<div id="homePage">
<div class="grid">

<div class="card" onclick="openChannel('tolo','طلوع')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993521-914660414.svg"><span>طلوع</span></div>
<div class="card" onclick="openChannel('irib3','شبکه سه')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993719-124056621.svg"><span>شبکه سه</span></div>
<div class="card" onclick="openChannel('varzesh','ورزش')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993702-549827287.svg"><span>ورزش</span></div>
<div class="card" onclick="openChannel('persiana','پرشیا اسپورت')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993686-807307490.svg"><span>پرشیا اسپورت</span></div>
<div class="card" onclick="openChannel('persiana2','پرشیا اسپورت 2')"><img src="https://cdn1.movieland.af/images/channels-logos/1763529079539-200808624.svg"><span>پرشیا اسپورت 2</span></div>
<div class="card" onclick="openChannel('solh','صلح اسپورت')"><img src="https://cdn1.movieland.af/images/channels-logos/1769243953209-579707064.svg"><span>صلح اسپورت</span></div>
<div class="card" onclick="openChannel('sportsaf','Sports AF')"><img src="https://cdn1.movieland.af/images/channels-logos/1768027145119-177342014.svg"><span>Sports AF</span></div>
<div class="card" onclick="openChannel('arezo','آرزو')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993620-281627637.svg"><span>آرزو</span></div>
<div class="card" onclick="openChannel('ariana','آریانا')"><img src="https://cdn1.movieland.af/images/channel-logos/1760950993561-302702845.svg"><span>آریانا</span></div>
<div class="card" onclick="openChannel('meraj','معراج')"><img src="https://cdn1.movieland.af/images/channels-logos/1769234333004-354961839.svg"><span>معراج</span></div>

</div>
</div>

<div id="playerPage">
<h2 id="channelTitle"></h2>

<div class="videoWrapper">
<video id="video" playsinline controls></video>
<div id="overlayLogo">Ishaq TV</div>
<div id="linkLabel">Auto</div>

<!-- منوی کیفیت شیشه‌ای -->
<div id="qualityMenu">
  <div id="qualityBtn">⚙️ کیفیت</div>
  <div id="qualityOptions">
    <div onclick="setQuality('auto')">Auto</div>
    <div onclick="setQuality(1080)">1080p</div>
    <div onclick="setQuality(720)">720p</div>
  </div>
</div>

</div>

<br>
<button onclick="goBack()">بازگشت</button>
</div>

<script>
let hls;
let player;
let currentChannel="";

// لینک‌های شبکه‌ها با chunklist مشخص
const channels={
tolo:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/tolo/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/tolo/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/tolo/chunklist1.m3u8"},
irib3:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/irib3/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/irib3/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/irib3/chunklist1.m3u8"},
varzesh:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/varzesh/chunklist1.m3u8"},
persiana:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana/chunklist1.m3u8"},
persiana2:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/persiana2/chunklist1.m3u8"},
solh:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/solh/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/solh/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/solh/chunklist1.m3u8"},
sportsaf:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/sportsaf/chunklist1.m3u8"},
arezo:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/arezo/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/arezo/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/arezo/chunklist1.m3u8"},
ariana:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/ariana/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/ariana/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/ariana/chunklist1.m3u8"},
meraj:{auto:"https://ishaq-proxy.eshaqtv1.workers.dev/meraj/playlist.m3u8",1080:"https://ishaq-proxy.eshaqtv1.workers.dev/meraj/chunklist0.m3u8",720:"https://ishaq-proxy.eshaqtv1.workers.dev/meraj/chunklist1.m3u8"}
};

// باز کردن شبکه
function openChannel(channel,name){
currentChannel=channel;
document.getElementById("channelTitle").innerText=name;
document.getElementById("homePage").style.display="none";
document.getElementById("playerPage").style.display="block";

// شروع با Auto
loadStream('auto');
}

// بارگذاری استریم با کیفیت مشخص
function loadStream(q){
const video=document.getElementById("video");
let url = channels[currentChannel][q];
document.getElementById("linkLabel").innerText = q==="auto" ? "Auto" : q+"p";

if(hls){hls.destroy();}
if(player){player.destroy();}

if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
player = new Plyr(video,{settings:['speed','fullscreen']});
video.play();
});

hls.on(Hls.Events.ERROR,function(e,d){
if(d.fatal){alert("هیچ لینکی کار نکرد");}
});
}else if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play();
}
}

// دکمه بازگشت
function goBack(){
if(hls){hls.destroy();}
if(player){player.destroy();}
document.getElementById("playerPage").style.display="none";
document.getElementById("homePage").style.display="block";
}

// منوی کیفیت شیشه‌ای
document.getElementById("qualityBtn").onclick = ()=>{
let menu = document.getElementById("qualityOptions");
menu.style.display = menu.style.display === "block" ? "none" : "block";
};

function setQuality(q){
loadStream(q);
document.getElementById("qualityOptions").style.display="none";
}
</script>

</body>
</html>
